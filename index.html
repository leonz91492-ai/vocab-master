<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語單字學習平臺</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        
        /* 閃卡翻轉動畫與 3D 效果設定 */
        .flip-card {
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            -webkit-transform: translateZ(0); /* 增加這行：強制硬體加速，解決手機版 Safari 穿透 Bug */
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* Toast 提示框動畫 */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideInUp 0.3s ease-out forwards;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- 登入畫面覆蓋層 -->
    <div id="login-overlay" class="absolute inset-0 bg-gray-50 z-[100] flex flex-col items-center justify-center hidden">
        <i class="fa-solid fa-graduation-cap text-indigo-600 text-6xl mb-6"></i>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">VocabMaster</h1>
        <p class="text-gray-600 mb-8">請登入以跨裝置同步您的單字庫</p>
        <button id="google-login-btn" class="bg-white border border-gray-300 text-gray-700 font-semibold py-3 px-6 rounded-lg hover:bg-gray-50 transition-colors flex items-center shadow-sm">
            <i class="fa-brands fa-google text-red-500 mr-3"></i> 使用 Google 帳號登入
        </button>
    </div>

    <!-- 導覽列 -->
    <nav class="bg-indigo-600 text-white shadow-lg z-10 flex-shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-graduation-cap text-2xl mr-3"></i>
                    <span class="font-bold text-xl tracking-tight">VocabMaster</span>
                </div>
                <div class="flex items-center space-x-1 sm:space-x-4">
                    <button onclick="switchTab('add')" id="nav-add" class="nav-btn px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition-colors bg-indigo-700">
                        <i class="fa-solid fa-plus sm:mr-1"></i> <span class="hidden sm:inline">新增單字</span>
                    </button>
                    <button onclick="switchTab('list')" id="nav-list" class="nav-btn px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition-colors">
                        <i class="fa-solid fa-book sm:mr-1"></i> <span class="hidden sm:inline">我的單字庫</span>
                    </button>
                    <button onclick="switchTab('review')" id="nav-review" class="nav-btn px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition-colors">
                        <i class="fa-solid fa-layer-group sm:mr-1"></i> <span class="hidden sm:inline">複習模式</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="flex-grow overflow-y-auto relative bg-gray-50 p-4 sm:p-6 lg:p-8">
        
        <!-- 全局載入畫面 -->
        <div id="loading-overlay" class="absolute inset-0 bg-gray-50 z-50 flex flex-col items-center justify-center">
            <i class="fa-solid fa-circle-notch fa-spin text-indigo-600 text-5xl mb-4"></i>
            <p class="text-gray-600 font-medium">正在連線至資料庫...</p>
        </div>

        <div class="max-w-4xl mx-auto">
            
            <!-- Tab 1: 新增單字 -->
            <section id="tab-add" class="tab-content block">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-8">
                    <!-- 手動單筆新增區塊 -->
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                        <i class="fa-solid fa-feather text-indigo-500 mr-2"></i> 記錄新單字
                    </h2>
                    <form id="add-word-form" class="space-y-5">
                        <div>
                            <label for="word" class="block text-sm font-medium text-gray-700 mb-1">英文單字 *</label>
                            <input type="text" id="word" required autocomplete="off" placeholder="例如：Fascinating" 
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                        </div>
                        <div>
                            <label for="translation" class="block text-sm font-medium text-gray-700 mb-1">中文翻譯/解釋 *</label>
                            <input type="text" id="translation" required autocomplete="off" placeholder="例如：迷人的、極有吸引力的" 
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                        </div>
                        <div>
                            <label for="example" class="block text-sm font-medium text-gray-700 mb-1">例句 (選填)</label>
                            <textarea id="example" rows="3" placeholder="例如：The book offers a fascinating glimpse into the lives of the rich." 
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors flex justify-center items-center">
                            <i class="fa-solid fa-cloud-arrow-up mr-2"></i> 儲存至資料庫
                        </button>
                    </form>

                    <!-- 分隔線 -->
                    <div class="relative my-10">
                        <div class="absolute inset-0 flex items-center" aria-hidden="true">
                            <div class="w-full border-t border-gray-200"></div>
                        </div>
                        <div class="relative flex justify-center">
                            <span class="bg-white px-3 text-sm text-gray-400">或者</span>
                        </div>
                    </div>

                    <!-- 批次匯入區塊 -->
                    <div>
                        <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                            <i class="fa-solid fa-file-csv text-green-500 mr-2"></i> 批次匯入單字庫
                        </h2>
                        <div class="bg-green-50 rounded-xl p-5 border border-green-100">
                            <p class="text-sm text-gray-700 mb-3 font-medium">請上傳包含 <span class="bg-green-200 px-1 rounded">英文,中文,例句(選填)</span> 三個欄位的 CSV 檔案。</p>
                            <div class="flex flex-col sm:flex-row items-center gap-3">
                                <input type="file" id="csv-upload" accept=".csv" 
                                    class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700 file:cursor-pointer transition-colors bg-white rounded-lg border border-gray-200 p-1">
                                <button id="btn-import-csv" class="w-full sm:w-auto bg-green-600 text-white font-semibold py-2.5 px-6 rounded-lg hover:bg-green-700 transition-colors flex justify-center items-center flex-shrink-0 shadow-sm">
                                    <i class="fa-solid fa-upload mr-2"></i> 開始匯入
                                </button>
                            </div>
                            <p class="text-xs text-gray-500 mt-3"><i class="fa-solid fa-circle-info mr-1"></i> 若第一行為標題 (如 Word, Translation)，系統會自動偵測並略過。</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Tab 2: 單字列表 -->
            <section id="tab-list" class="tab-content hidden">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                        <i class="fa-solid fa-database text-indigo-500 mr-2"></i> 我的單字庫
                    </h2>
                    <div class="flex items-center space-x-3">
                        <!-- 新增：批次刪除按鈕 (預設隱藏) -->
                        <button id="btn-delete-selected" onclick="deleteSelectedWords()" class="hidden bg-red-100 text-red-600 px-3 py-1 rounded-full text-sm font-medium hover:bg-red-200 transition-colors focus:outline-none focus:ring-2 focus:ring-red-500">
                            <i class="fa-solid fa-trash-can mr-1"></i> 刪除已選 (<span id="selected-count">0</span>)
                        </button>
                        <span id="word-count" class="text-sm font-medium text-gray-500 bg-gray-200 px-3 py-1 rounded-full">共 0 個字</span>
                    </div>
                </div>
                
                <div id="empty-list-state" class="hidden text-center py-16 bg-white rounded-2xl shadow-sm border border-gray-100">
                    <div class="text-gray-400 mb-4">
                        <i class="fa-solid fa-box-open text-6xl"></i>
                    </div>
                    <h3 class="text-lg font-medium text-gray-900 mb-2">資料庫是空的</h3>
                    <p class="text-gray-500">您還沒有加入任何單字，趕快去新增吧！</p>
                    <button onclick="switchTab('add')" class="mt-4 text-indigo-600 hover:text-indigo-800 font-medium">
                        前往新增單字 &rarr;
                    </button>
                </div>

                <div id="word-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    <!-- 單字卡片會透過 JS 渲染在這裡 -->
                </div>
            </section>

            <!-- Tab 3: 複習模式 -->
            <section id="tab-review" class="tab-content hidden">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-yellow-500 mr-2"></i> 閃卡複習
                </h2>
                
                <div id="empty-review-state" class="hidden text-center py-16 bg-white rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-gray-500">目前沒有單字可以複習，請先新增一些單字！</p>
                </div>

                <div id="review-container" class="flex flex-col items-center hidden">
                    <!-- 閃卡本體 -->
                    <div class="flip-card w-full max-w-md h-80 cursor-pointer" onclick="toggleFlashcard()">
                        <div id="flashcard-inner" class="flip-card-inner">
                            <!-- 正面：英文與發音按鈕 -->
                            <div class="flip-card-front bg-white flex flex-col items-center justify-center p-8 border border-gray-100">
                                <span class="text-sm text-gray-400 absolute top-4 left-4"><i class="fa-regular fa-hand-pointer"></i> 點擊翻面</span>
                                <span id="review-progress" class="text-sm text-gray-400 absolute top-4 right-4">1 / 10</span>
                                <div class="flex items-center justify-center w-full space-x-4">
                                    <h3 id="review-word" class="text-4xl font-bold text-gray-800 text-center break-words max-w-[80%]">Word</h3>
                                    <button onclick="playAudio('word', event)" class="text-indigo-500 hover:text-indigo-700 hover:bg-indigo-50 w-12 h-12 rounded-full flex items-center justify-center transition-colors focus:outline-none shadow-sm border border-gray-100 bg-white" title="聆聽單字發音">
                                        <i class="fa-solid fa-volume-high text-xl"></i>
                                    </button>
                                </div>
                            </div>
                            <!-- 背面：中文、例句與發音按鈕 -->
                            <div class="flip-card-back bg-indigo-50 flex flex-col items-center justify-center p-8 border border-indigo-100 relative">
                                <h4 id="review-translation" class="text-2xl font-semibold text-indigo-800 mb-4 text-center">翻譯</h4>
                                <div class="w-full h-px bg-indigo-200 mb-4"></div>
                                <div id="review-example-container" class="flex items-center justify-center space-x-3 w-full">
                                    <p id="review-example" class="text-gray-600 text-center italic text-sm sm:text-base line-clamp-4">例句</p>
                                    <button id="btn-play-example" onclick="playAudio('example', event)" class="text-indigo-500 hover:text-indigo-700 hover:bg-indigo-100 w-10 h-10 rounded-full flex items-center justify-center transition-colors focus:outline-none flex-shrink-0 shadow-sm border border-indigo-200 bg-white" title="聆聽例句">
                                        <i class="fa-solid fa-volume-high"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 控制按鈕 -->
                    <div class="flex space-x-4 mt-8">
                        <button onclick="prevCard()" class="w-14 h-14 rounded-full bg-white shadow-md text-gray-600 hover:text-indigo-600 hover:bg-gray-50 transition-colors flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <i class="fa-solid fa-arrow-left text-xl"></i>
                        </button>
                        <button onclick="nextCard()" class="w-14 h-14 rounded-full bg-indigo-600 shadow-md text-white hover:bg-indigo-700 transition-colors flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                            <i class="fa-solid fa-arrow-right text-xl"></i>
                        </button>
                    </div>
                    <p class="text-gray-400 text-sm mt-4">提示：使用左右方向鍵也可以切換卡片</p>
                </div>
            </section>

        </div>
    </main>

    <!-- Toast 通知容器 -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col space-y-2 pointer-events-none"></div>

    <!-- Firebase & 應用程式邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, deleteDoc, onSnapshot, collection, addDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 專案設定
        const firebaseConfig = {
            apiKey: "AIzaSyBpLVjTLbifHyS-u-dHkn1laGqmUqrlEqE",
            authDomain: "vocabmaster-23dbc.firebaseapp.com",
            projectId: "vocabmaster-23dbc",
            storageBucket: "vocabmaster-23dbc.firebasestorage.app",
            messagingSenderId: "454409193302",
            appId: "1:454409193302:web:0fe64f6cdff9e0c81738f7",
        };
        const appId = 'my-vocab-master';

        let app, db, auth;
        let currentUser = null;
        let vocabularies = [];
        let reviewVocabularies = []; // 用於存放隨機打亂後的複習清單
        let reviewIndex = 0;
        let isFlipped = false;
        
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 登入邏輯與防呆機制
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isWebView = (ua.indexOf("FBAN") > -1) || 
                              (ua.indexOf("FBAV") > -1) || 
                              (ua.indexOf("Instagram") > -1) || 
                              (ua.indexOf("Line") > -1);

            if (isWebView) {
                showToast("為確保帳號安全，請點選選單「以預設瀏覽器 (Safari/Chrome) 開啟」後再登入", "error");
                alert("Google 安全政策限制：\n請點擊畫面角落的選單，選擇「在 Safari 中開啟」或「在預設瀏覽器中開啟」才能順利登入喔！");
                return; 
            }

            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("登入失敗:", error);
                if (error.code === 'auth/unauthorized-domain') {
                    showToast("網域未授權！已切換為「訪客測試模式」", "error");
                    try {
                        await signInAnonymously(auth); // 沙盒環境備用方案
                    } catch (anonErr) {
                        console.error("匿名登入失敗:", anonErr);
                    }
                } else if (error.code === 'auth/popup-closed-by-user') {
                    showToast("登入已取消", "info");
                } else {
                    showToast("登入失敗，請重試", "error");
                }
            }
        });

        onAuthStateChanged(auth, (user) => {
            const loginOverlay = document.getElementById('login-overlay');
            const loadingOverlay = document.getElementById('loading-overlay');
            
            if (user) {
                currentUser = user;
                loginOverlay.classList.add('hidden');
                setupDatabaseListener();
            } else {
                currentUser = null;
                loginOverlay.classList.remove('hidden');
                loadingOverlay.classList.add('hidden');
            }
        });

        let unsubscribeSnapshot = null;
        function setupDatabaseListener() {
            if (!currentUser) return;
            
            document.getElementById('loading-overlay').classList.add('hidden');
            const vocabCollection = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'vocabulary');
            
            unsubscribeSnapshot = onSnapshot(vocabCollection, (snapshot) => {
                const tempVocabs = [];
                snapshot.forEach((doc) => {
                    tempVocabs.push({ id: doc.id, ...doc.data() });
                });
                
                vocabularies = tempVocabs.sort((a, b) => {
                    const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                    const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                    return timeB - timeA;
                });

                updateUI();
            }, (error) => {
                console.error("Snapshot error:", error);
                showToast("獲取資料庫失敗", "error");
            });
        }

        function updateUI() {
            renderList();
            document.getElementById('word-count').textContent = `共 ${vocabularies.length} 個字`;
        }

        // 頁籤切換與隨機洗牌邏輯
        window.switchTab = function(tabName) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-700');
            });
            document.getElementById(`nav-${tabName}`).classList.add('bg-indigo-700');

            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');

            if (tabName === 'review') {
                const selectedVocabs = vocabularies.filter(v => v.isSelected);
                const sourceList = selectedVocabs.length > 0 ? selectedVocabs : vocabularies;

                // Fisher-Yates 洗牌演算法
                reviewVocabularies = [...sourceList];
                for (let i = reviewVocabularies.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [reviewVocabularies[i], reviewVocabularies[j]] = [reviewVocabularies[j], reviewVocabularies[i]];
                }

                reviewIndex = 0;
                resetCardFlip();
                updateReviewState();
                
                if (selectedVocabs.length > 0) {
                    showToast(`重點複習！隨機抽取 ${selectedVocabs.length} 個已勾選單字`, "info");
                } else if (vocabularies.length > 0) {
                    showToast(`全面複習！隨機抽取全部 ${vocabularies.length} 個單字`, "info");
                }
            }
        };

        // 一般手動新增單字
        document.getElementById('add-word-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return showToast("請等待系統連線", "error");

            const wordInput = document.getElementById('word');
            const translationInput = document.getElementById('translation');
            const exampleInput = document.getElementById('example');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            const newWordData = {
                word: wordInput.value.trim(),
                translation: translationInput.value.trim(),
                example: exampleInput.value.trim(),
                isSelected: false,
                createdAt: serverTimestamp()
            };

            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> 儲存中...';
                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'vocabulary'), newWordData);
                showToast(`已新增單字：${newWordData.word}`, "success");
                e.target.reset();
                wordInput.focus();
            } catch (error) {
                console.error("Error adding document:", error);
                showToast("新增失敗，請稍後再試", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2"></i> 儲存至資料庫';
            }
        });

        // CSV 批次匯入功能
        function parseCSVLine(text) {
            let result = [], inQuote = false, value = '';
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (inQuote) {
                    if (char === '"') {
                        if (i + 1 < text.length && text[i + 1] === '"') { value += '"'; i++; } 
                        else { inQuote = false; }
                    } else { value += char; }
                } else {
                    if (char === '"') { inQuote = true; } 
                    else if (char === ',') { result.push(value.trim()); value = ''; } 
                    else { value += char; }
                }
            }
            result.push(value.trim());
            return result;
        }

        document.getElementById('btn-import-csv').addEventListener('click', () => {
            if (!currentUser) return showToast("請等待系統連線", "error");
            const fileInput = document.getElementById('csv-upload');
            const file = fileInput.files[0];
            if (!file) return showToast("請先點擊選擇一個 CSV 檔案", "error");

            const btn = document.getElementById('btn-import-csv');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> 讀取並匯入中...';

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const lines = e.target.result.split(/\r?\n/).filter(line => line.trim().length > 0);
                    if (lines.length === 0) throw new Error("檔案內容為空");

                    const vocabCollection = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'vocabulary');
                    let successCount = 0;
                    let startIndex = lines[0].toLowerCase().match(/(word|單字|英文)/) ? 1 : 0;
                    const uploadPromises = [];

                    for (let i = startIndex; i < lines.length; i++) {
                        const row = parseCSVLine(lines[i]);
                        if (row[0] && row[1]) {
                            uploadPromises.push(addDoc(vocabCollection, {
                                word: row[0], translation: row[1], example: row[2] || '', isSelected: false, createdAt: serverTimestamp()
                            }).then(() => successCount++));
                        }
                    }
                    await Promise.all(uploadPromises);
                    showToast(`✅ 成功匯入 ${successCount} 個單字！`, "success");
                    fileInput.value = '';
                    switchTab('list');
                } catch (error) {
                    showToast("匯入失敗，請確認檔案格式是否正確", "error");
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-upload mr-2"></i> 開始匯入';
                }
            };
            reader.readAsText(file, 'UTF-8');
        });

        // 狀態更新與單筆刪除
        window.toggleSelect = async function(id, isSelected) {
            if(!currentUser) return;
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'vocabulary', id), { isSelected });
            } catch (error) {
                showToast("更新狀態失敗", "error");
            }
        };

        window.deleteWord = async function(id, wordText) {
            if(!currentUser) return;
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4';
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full">
                    <h3 class="text-lg font-bold text-gray-900 mb-2">確認刪除</h3>
                    <p class="text-gray-600 mb-6">您確定要從資料庫移除「<span class="font-semibold">${wordText}</span>」嗎？</p>
                    <div class="flex justify-end space-x-3">
                        <button id="cancel-del" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg">取消</button>
                        <button id="confirm-del" class="px-4 py-2 bg-red-600 text-white rounded-lg">確認刪除</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);

            return new Promise((resolve) => {
                document.getElementById('cancel-del').onclick = () => { modal.remove(); resolve(false); };
                document.getElementById('confirm-del').onclick = async () => {
                    modal.remove();
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'vocabulary', id));
                        showToast("單字已刪除", "success");
                    } catch (error) { showToast("刪除失敗", "error"); }
                    resolve(true);
                };
            });
        };

        // 新增：批次刪除已選單字
        window.deleteSelectedWords = async function() {
            if(!currentUser) return;
            const selectedVocabs = vocabularies.filter(v => v.isSelected);
            if (selectedVocabs.length === 0) return;

            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4';
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full">
                    <h3 class="text-lg font-bold text-gray-900 mb-2">確認批次刪除</h3>
                    <p class="text-gray-600 mb-6">您確定要從資料庫移除這 <span class="font-bold text-red-600">${selectedVocabs.length}</span> 個已勾選的單字嗎？此動作無法復原。</p>
                    <div class="flex justify-end space-x-3">
                        <button id="cancel-batch-del" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg">取消</button>
                        <button id="confirm-batch-del" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">確認刪除</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);

            return new Promise((resolve) => {
                document.getElementById('cancel-batch-del').onclick = () => { modal.remove(); resolve(false); };
                document.getElementById('confirm-batch-del').onclick = async () => {
                    modal.remove();
                    const btn = document.getElementById('btn-delete-selected');
                    const originalHTML = btn.innerHTML;
                    
                    try {
                        btn.disabled = true;
                        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> 刪除中...';

                        // 使用 Promise.all 同時發送多個刪除請求，提升效能
                        const deletePromises = selectedVocabs.map(vocab => 
                            deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'vocabulary', vocab.id))
                        );
                        await Promise.all(deletePromises);
                        
                        showToast(`已成功刪除 ${selectedVocabs.length} 個單字`, "success");
                    } catch (error) { 
                        console.error(error);
                        showToast("批次刪除失敗", "error"); 
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = originalHTML;
                    }
                    resolve(true);
                };
            });
        };

        // 列表與複習介面渲染
        function renderList() {
            const grid = document.getElementById('word-grid');
            const emptyState = document.getElementById('empty-list-state');
            const btnDeleteSelected = document.getElementById('btn-delete-selected');
            const selectedCountSpan = document.getElementById('selected-count');
            
            grid.innerHTML = '';

            // 計算已勾選數量並動態顯示/隱藏「批次刪除」按鈕
            const selectedCount = vocabularies.filter(v => v.isSelected).length;
            if (selectedCount > 0) {
                btnDeleteSelected.classList.remove('hidden');
                selectedCountSpan.textContent = selectedCount;
            } else {
                btnDeleteSelected.classList.add('hidden');
            }

            if (vocabularies.length === 0) {
                grid.classList.add('hidden'); emptyState.classList.remove('hidden'); return;
            }

            grid.classList.remove('hidden'); emptyState.classList.add('hidden');

            vocabularies.forEach(vocab => {
                const card = document.createElement('div');
                card.className = `p-5 rounded-xl border shadow-sm transition-all relative flex flex-col h-full ${vocab.isSelected ? 'bg-indigo-50 border-indigo-300' : 'bg-white border-gray-200'}`;
                const exampleHTML = vocab.example ? `<p class="text-sm text-gray-600 italic mt-3 bg-white bg-opacity-60 p-2 rounded line-clamp-3">"${escapeHtml(vocab.example)}"</p>` : '';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold ${vocab.isSelected ? 'text-indigo-800' : 'text-indigo-700'} break-words pr-12">${escapeHtml(vocab.word)}</h3>
                        <div class="flex items-center space-x-3 absolute top-4 right-4">
                            <label class="flex items-center cursor-pointer text-gray-400 hover:text-indigo-600" title="選取單字">
                                <input type="checkbox" class="w-5 h-5 cursor-pointer accent-indigo-600" ${vocab.isSelected ? 'checked' : ''} onchange="toggleSelect('${vocab.id}', this.checked)">
                            </label>
                            <button onclick="deleteWord('${vocab.id}', '${escapeHtml(vocab.word).replace(/'/g, "\\'")}')" class="text-gray-300 hover:text-red-500" title="刪除單字">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-base font-medium text-gray-800 break-words">${escapeHtml(vocab.translation)}</p>
                    <div class="mt-auto">${exampleHTML}</div>`;
                grid.appendChild(card);
            });
        }

        function updateReviewState() {
            const emptyState = document.getElementById('empty-review-state');
            const reviewContainer = document.getElementById('review-container');

            if (reviewVocabularies.length === 0) {
                emptyState.classList.remove('hidden'); reviewContainer.classList.add('hidden'); return;
            }

            emptyState.classList.add('hidden'); reviewContainer.classList.remove('hidden');

            if (reviewIndex >= reviewVocabularies.length) reviewIndex = 0;
            if (reviewIndex < 0) reviewIndex = reviewVocabularies.length - 1;

            const currentWord = reviewVocabularies[reviewIndex];
            document.getElementById('review-progress').textContent = `${reviewIndex + 1} / ${reviewVocabularies.length}`;
            document.getElementById('review-word').textContent = currentWord.word;
            document.getElementById('review-translation').textContent = currentWord.translation;
            
            const exampleEl = document.getElementById('review-example');
            const exampleContainer = document.getElementById('review-example-container');
            
            if (currentWord.example) {
                exampleEl.textContent = `"${currentWord.example}"`;
                exampleContainer.classList.remove('hidden');
                exampleContainer.classList.add('flex');
            } else {
                exampleContainer.classList.add('hidden');
                exampleContainer.classList.remove('flex');
            }

            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }

        window.toggleFlashcard = function() {
            isFlipped = !isFlipped;
            const inner = document.getElementById('flashcard-inner');
            if (isFlipped) inner.parentElement.classList.add('flipped');
            else inner.parentElement.classList.remove('flipped');
        };

        // 語音朗讀 API
        window.playAudio = function(type, event) {
            if (event) event.stopPropagation(); // 阻擋點擊事件冒泡，防止閃卡翻轉
            if (!('speechSynthesis' in window)) return showToast("您的瀏覽器不支援語音朗讀功能", "error");

            window.speechSynthesis.cancel(); // 停止先前的朗讀

            let textToSpeak = type === 'word' 
                ? document.getElementById('review-word').textContent 
                : document.getElementById('review-example').textContent.replace(/(^")|("$)/g, ''); // 移除例句前後引號

            if (textToSpeak) {
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; // 稍慢的語速適合教學
                window.speechSynthesis.speak(utterance);
            }
        };

        window.resetCardFlip = function() {
            isFlipped = false;
            const inner = document.getElementById('flashcard-inner');
            if(inner) inner.parentElement.classList.remove('flipped');
        };

        window.nextCard = function() {
            resetCardFlip();
            setTimeout(() => {
                reviewIndex++;
                if (reviewIndex >= reviewVocabularies.length) reviewIndex = 0;
                updateReviewState();
            }, 150); 
        };

        window.prevCard = function() {
            resetCardFlip();
            setTimeout(() => {
                reviewIndex--;
                if (reviewIndex < 0) reviewIndex = reviewVocabularies.length - 1;
                updateReviewState();
            }, 150);
        };

        // 鍵盤操控支援
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('tab-review').classList.contains('hidden')) return;
            if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
            if (e.key === 'ArrowRight') window.nextCard();
            else if (e.key === 'ArrowLeft') window.prevCard();
            else if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault(); 
                window.toggleFlashcard();
            }
        });

        // 共用工具函數
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let bgColor = type === 'success' ? 'bg-green-600' : (type === 'error' ? 'bg-red-600' : 'bg-gray-800');
            let icon = type === 'success' ? '<i class="fa-solid fa-circle-check"></i>' : (type === 'error' ? '<i class="fa-solid fa-circle-exclamation"></i>' : '<i class="fa-solid fa-circle-info"></i>');

            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center space-x-3 toast-enter pointer-events-auto`;
            toast.innerHTML = `<span class="text-lg">${icon}</span><span class="font-medium">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0'; toast.style.transform = 'translateY(100%)'; toast.style.transition = 'all 0.3s ease-in';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHtml(unsafe) {
            return (unsafe || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
