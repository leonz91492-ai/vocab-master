<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語單字學習平臺</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        
        /* 閃卡翻轉動畫與 3D 效果設定 */
        .flip-card {
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* Toast 提示框動畫 */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideInUp 0.3s ease-out forwards;
        }
        
        /* 隱藏捲軸但保留捲動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- 登入畫面覆蓋層 -->
    <div id="login-overlay" class="absolute inset-0 bg-gray-50 z-[100] flex flex-col items-center justify-center hidden">
        <i class="fa-solid fa-graduation-cap text-indigo-600 text-6xl mb-6"></i>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">VocabMaster</h1>
        <p class="text-gray-600 mb-8">請登入以跨裝置同步您的單字庫</p>
        <button id="google-login-btn" class="bg-white border border-gray-300 text-gray-700 font-semibold py-3 px-6 rounded-lg hover:bg-gray-50 transition-colors flex items-center shadow-sm">
            <i class="fa-brands fa-google text-red-500 mr-3"></i> 使用 Google 帳號登入
        </button>
    </div>

    <!-- 導覽列 -->
    <nav class="bg-indigo-600 text-white shadow-lg z-10 flex-shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-graduation-cap text-2xl mr-3"></i>
                    <span class="font-bold text-xl tracking-tight">VocabMaster</span>
                </div>
                <div class="flex items-center space-x-1 sm:space-x-4">
                    <button onclick="switchTab('add')" id="nav-add" class="nav-btn px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition-colors bg-indigo-700">
                        <i class="fa-solid fa-plus sm:mr-1"></i> <span class="hidden sm:inline">新增單字</span>
                    </button>
                    <button onclick="switchTab('list')" id="nav-list" class="nav-btn px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition-colors">
                        <i class="fa-solid fa-book sm:mr-1"></i> <span class="hidden sm:inline">我的單字庫</span>
                    </button>
                    <button onclick="switchTab('review')" id="nav-review" class="nav-btn px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition-colors">
                        <i class="fa-solid fa-layer-group sm:mr-1"></i> <span class="hidden sm:inline">複習模式</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="flex-grow overflow-y-auto relative bg-gray-50 p-4 sm:p-6 lg:p-8">
        
        <!-- 全局載入畫面 -->
    <div id="loading-overlay" class="absolute inset-0 bg-gray-50 z-50 flex flex-col items-center justify-center">
        <i class="fa-solid fa-circle-notch fa-spin text-indigo-600 text-5xl mb-4"></i>
        <p class="text-gray-600 font-medium">正在連線至資料庫...</p>
    </div>

    <div class="max-w-4xl mx-auto">
            
            <!-- Tab 1: 新增單字 -->
            <section id="tab-add" class="tab-content block">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                        <i class="fa-solid fa-feather text-indigo-500 mr-2"></i> 記錄新單字
                    </h2>
                    <form id="add-word-form" class="space-y-5">
                        <div>
                            <label for="word" class="block text-sm font-medium text-gray-700 mb-1">英文單字 *</label>
                            <input type="text" id="word" required autocomplete="off" placeholder="例如：Fascinating" 
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                        </div>
                        <div>
                            <label for="translation" class="block text-sm font-medium text-gray-700 mb-1">中文翻譯/解釋 *</label>
                            <input type="text" id="translation" required autocomplete="off" placeholder="例如：迷人的、極有吸引力的" 
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                        </div>
                        <div>
                            <label for="example" class="block text-sm font-medium text-gray-700 mb-1">例句 (選填)</label>
                            <textarea id="example" rows="3" placeholder="例如：The book offers a fascinating glimpse into the lives of the rich." 
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors flex justify-center items-center">
                            <i class="fa-solid fa-cloud-arrow-up mr-2"></i> 儲存至資料庫
                        </button>
                    </form>
                </div>
            </section>

            <!-- Tab 2: 單字列表 -->
            <section id="tab-list" class="tab-content hidden">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                        <i class="fa-solid fa-database text-indigo-500 mr-2"></i> 我的單字庫
                    </h2>
                    <span id="word-count" class="text-sm font-medium text-gray-500 bg-gray-200 px-3 py-1 rounded-full">共 0 個字</span>
                </div>
                
                <div id="empty-list-state" class="hidden text-center py-16 bg-white rounded-2xl shadow-sm border border-gray-100">
                    <div class="text-gray-400 mb-4">
                        <i class="fa-solid fa-box-open text-6xl"></i>
                    </div>
                    <h3 class="text-lg font-medium text-gray-900 mb-2">資料庫是空的</h3>
                    <p class="text-gray-500">您還沒有加入任何單字，趕快去新增吧！</p>
                    <button onclick="switchTab('add')" class="mt-4 text-indigo-600 hover:text-indigo-800 font-medium">
                        前往新增單字 &rarr;
                    </button>
                </div>

                <div id="word-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    <!-- 單字卡片會透過 JS 渲染在這裡 -->
                </div>
            </section>

            <!-- Tab 3: 複習模式 -->
            <section id="tab-review" class="tab-content hidden">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-yellow-500 mr-2"></i> 閃卡複習
                </h2>
                
                <div id="empty-review-state" class="hidden text-center py-16 bg-white rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-gray-500">目前沒有單字可以複習，請先新增一些單字！</p>
                </div>

                <div id="review-container" class="flex flex-col items-center hidden">
                    <!-- 閃卡本體 -->
                    <div class="flip-card w-full max-w-md h-80 cursor-pointer" onclick="toggleFlashcard()">
                        <div id="flashcard-inner" class="flip-card-inner">
                            <!-- 正面：英文 -->
                            <div class="flip-card-front bg-white flex flex-col items-center justify-center p-8 border border-gray-100">
                                <span class="text-sm text-gray-400 absolute top-4 left-4"><i class="fa-regular fa-hand-pointer"></i> 點擊翻面</span>
                                <span id="review-progress" class="text-sm text-gray-400 absolute top-4 right-4">1 / 10</span>
                                <h3 id="review-word" class="text-4xl font-bold text-gray-800 text-center break-words w-full">Word</h3>
                            </div>
                            <!-- 背面：中文與例句 -->
                            <div class="flip-card-back bg-indigo-50 flex flex-col items-center justify-center p-8 border border-indigo-100">
                                <h4 id="review-translation" class="text-2xl font-semibold text-indigo-800 mb-4 text-center">翻譯</h4>
                                <div class="w-full h-px bg-indigo-200 mb-4"></div>
                                <p id="review-example" class="text-gray-600 text-center italic text-sm sm:text-base line-clamp-4">例句</p>
                            </div>
                        </div>
                    </div>

                    <!-- 控制按鈕 -->
                    <div class="flex space-x-4 mt-8">
                        <button onclick="prevCard()" class="w-14 h-14 rounded-full bg-white shadow-md text-gray-600 hover:text-indigo-600 hover:bg-gray-50 transition-colors flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <i class="fa-solid fa-arrow-left text-xl"></i>
                        </button>
                        <button onclick="nextCard()" class="w-14 h-14 rounded-full bg-indigo-600 shadow-md text-white hover:bg-indigo-700 transition-colors flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                            <i class="fa-solid fa-arrow-right text-xl"></i>
                        </button>
                    </div>
                    <p class="text-gray-400 text-sm mt-4">提示：使用左右方向鍵也可以切換卡片</p>
                </div>
            </section>

        </div>
    </main>

    <!-- Toast 通知容器 -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col space-y-2 pointer-events-none"></div>

    <!-- Firebase & 應用程式邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, deleteDoc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ★ 請將這裡的內容替換為你在 Firebase 主控台獲取的 firebaseConfig ★
        const firebaseConfig = {
            apiKey: "AIzaSyBpLVjTLbifHyS-u-dHkn1laGqmUqrlEqE",
  authDomain: "vocabmaster-23dbc.firebaseapp.com",
  projectId: "vocabmaster-23dbc",
  storageBucket: "vocabmaster-23dbc.firebasestorage.app",
  messagingSenderId: "454409193302",
  appId: "1:454409193302:web:0fe64f6cdff9e0c81738f7",
        };
        const appId = 'my-vocab-master'; // 可自訂您的應用程式代號

        // 應用程式狀態
        let app, db, auth;
        let currentUser = null;
        let vocabularies = [];
        let reviewIndex = 0;
        let isFlipped = false;
        
        // 初始化 Firebase
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 處理 Google 登入邏輯
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("登入失敗:", error);
                showToast("登入失敗，請重試", "error");
            }
        });

        // 監聽登入狀態：確保不同裝置登入同一帳號時，能載入相同資料
        onAuthStateChanged(auth, (user) => {
            const loginOverlay = document.getElementById('login-overlay');
            const loadingOverlay = document.getElementById('loading-overlay');
            
            if (user) {
                currentUser = user;
                loginOverlay.classList.add('hidden');
                setupDatabaseListener();
            } else {
                currentUser = null;
                loginOverlay.classList.remove('hidden');
                loadingOverlay.classList.add('hidden');
            }
        });

        // 設定資料庫即時監聽
        let unsubscribeSnapshot = null;
        function setupDatabaseListener() {
            if (!currentUser) return;
            
            // 隱藏載入畫面
            document.getElementById('loading-overlay').classList.add('hidden');

            const vocabCollection = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'vocabulary');
            
            // 使用 onSnapshot 實時獲取資料 (Rule: No complex queries, 排序我們在客戶端做)
            unsubscribeSnapshot = onSnapshot(vocabCollection, (snapshot) => {
                const tempVocabs = [];
                snapshot.forEach((doc) => {
                    tempVocabs.push({ id: doc.id, ...doc.data() });
                });
                
                // 客戶端排序：最新的在前面
                vocabularies = tempVocabs.sort((a, b) => {
                    const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                    const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                    return timeB - timeA;
                });

                updateUI();
            }, (error) => {
                console.error("Snapshot error:", error);
                showToast("獲取資料庫失敗", "error");
            });
        }

        // UI 更新總管
        function updateUI() {
            renderList();
            updateReviewState();
            document.getElementById('word-count').textContent = `共 ${vocabularies.length} 個字`;
        }

        // 切換頁籤 (掛載到 window 以供 HTML onclick 呼叫)
        window.switchTab = function(tabName) {
            // 更新按鈕樣式
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-700');
            });
            document.getElementById(`nav-${tabName}`).classList.add('bg-indigo-700');

            // 更新內容顯示
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');

            // 如果切換到複習模式，重置卡片狀態
            if (tabName === 'review') {
                if (vocabularies.length > 0 && reviewIndex >= vocabularies.length) {
                    reviewIndex = 0;
                }
                resetCardFlip();
                updateReviewState();
            }
        };

        // 處理新增單字表單
        document.getElementById('add-word-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) {
                showToast("請等待系統連線", "error");
                return;
            }

            const wordInput = document.getElementById('word');
            const translationInput = document.getElementById('translation');
            const exampleInput = document.getElementById('example');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            const newWordData = {
                word: wordInput.value.trim(),
                translation: translationInput.value.trim(),
                example: exampleInput.value.trim(),
                createdAt: serverTimestamp()
            };

            try {
                // 鎖定按鈕避免重複提交
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> 儲存中...';

                const vocabCollection = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'vocabulary');
                await addDoc(vocabCollection, newWordData);
                
                showToast(`已新增單字：${newWordData.word}`, "success");
                
                // 清空表單
                e.target.reset();
                wordInput.focus();
                
            } catch (error) {
                console.error("Error adding document: ", error);
                showToast("新增失敗，請稍後再試", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2"></i> 儲存至資料庫';
            }
        });

        // 刪除單字
        window.deleteWord = async function(id, wordText) {
            // 使用自定義 modal 替代 confirm()
            if(!currentUser) return;

            const modalOverlay = document.createElement('div');
            modalOverlay.className = 'fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4';
            modalOverlay.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full transform transition-all">
                    <h3 class="text-lg font-bold text-gray-900 mb-2">確認刪除</h3>
                    <p class="text-gray-600 mb-6">您確定要從資料庫中移除「<span class="font-semibold text-gray-800">${wordText}</span>」嗎？此動作無法復原。</p>
                    <div class="flex justify-end space-x-3">
                        <button id="cancel-del" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors">取消</button>
                        <button id="confirm-del" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">確認刪除</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modalOverlay);

            return new Promise((resolve) => {
                document.getElementById('cancel-del').onclick = () => {
                    document.body.removeChild(modalOverlay);
                    resolve(false);
                };
                document.getElementById('confirm-del').onclick = async () => {
                    document.body.removeChild(modalOverlay);
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'vocabulary', id);
                        await deleteDoc(docRef);
                        showToast("單字已刪除", "success");
                        // 修正刪除後複習索引越界問題
                        if (vocabularies.length > 0 && reviewIndex >= vocabularies.length - 1) {
                            reviewIndex = Math.max(0, vocabularies.length - 2); 
                        }
                    } catch (error) {
                        console.error("Error deleting doc:", error);
                        showToast("刪除失敗", "error");
                    }
                    resolve(true);
                };
            });
        };

        // 渲染單字列表
        function renderList() {
            const grid = document.getElementById('word-grid');
            const emptyState = document.getElementById('empty-list-state');

            grid.innerHTML = '';

            if (vocabularies.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            vocabularies.forEach(vocab => {
                const card = document.createElement('div');
                card.className = 'bg-white p-5 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow relative group flex flex-col h-full';
                
                // 處理可能為空的例句
                const exampleHTML = vocab.example 
                    ? `<p class="text-sm text-gray-600 italic mt-3 bg-gray-50 p-2 rounded line-clamp-3">"${escapeHtml(vocab.example)}"</p>` 
                    : '';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold text-indigo-700 break-words pr-6">${escapeHtml(vocab.word)}</h3>
                        <button onclick="deleteWord('${vocab.id}', '${escapeHtml(vocab.word).replace(/'/g, "\\'")}')" class="text-gray-300 hover:text-red-500 transition-colors absolute top-4 right-4">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                    <p class="text-base font-medium text-gray-800 break-words">${escapeHtml(vocab.translation)}</p>
                    <div class="mt-auto">
                        ${exampleHTML}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 更新複習模式 UI
        function updateReviewState() {
            const emptyState = document.getElementById('empty-review-state');
            const reviewContainer = document.getElementById('review-container');

            if (vocabularies.length === 0) {
                emptyState.classList.remove('hidden');
                reviewContainer.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            reviewContainer.classList.remove('hidden');

            // 確保索引有效
            if (reviewIndex >= vocabularies.length) reviewIndex = 0;
            if (reviewIndex < 0) reviewIndex = vocabularies.length - 1;

            const currentWord = vocabularies[reviewIndex];
            
            document.getElementById('review-progress').textContent = `${reviewIndex + 1} / ${vocabularies.length}`;
            document.getElementById('review-word').textContent = currentWord.word;
            document.getElementById('review-translation').textContent = currentWord.translation;
            
            const exampleEl = document.getElementById('review-example');
            if (currentWord.example) {
                exampleEl.textContent = `"${currentWord.example}"`;
                exampleEl.classList.remove('hidden');
            } else {
                exampleEl.classList.add('hidden');
            }
        }

        // 閃卡互動邏輯
        window.toggleFlashcard = function() {
            isFlipped = !isFlipped;
            const inner = document.getElementById('flashcard-inner');
            if (isFlipped) {
                inner.parentElement.classList.add('flipped');
            } else {
                inner.parentElement.classList.remove('flipped');
            }
        };

        window.resetCardFlip = function() {
            isFlipped = false;
            const inner = document.getElementById('flashcard-inner');
            if(inner) {
                inner.parentElement.classList.remove('flipped');
            }
        };

        window.nextCard = function() {
            resetCardFlip();
            setTimeout(() => {
                reviewIndex++;
                if (reviewIndex >= vocabularies.length) reviewIndex = 0; // 循環
                updateReviewState();
            }, 150); // 給予翻轉重置一點時間
        };

        window.prevCard = function() {
            resetCardFlip();
            setTimeout(() => {
                reviewIndex--;
                if (reviewIndex < 0) reviewIndex = vocabularies.length - 1; // 循環
                updateReviewState();
            }, 150);
        };

        // 鍵盤事件監聽 (左右方向鍵切換卡片)
        document.addEventListener('keydown', (e) => {
            // 只有在複習模式下，且沒有在輸入框中時才生效
            if (document.getElementById('tab-review').classList.contains('hidden')) return;
            if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;

            if (e.key === 'ArrowRight') {
                window.nextCard();
            } else if (e.key === 'ArrowLeft') {
                window.prevCard();
            } else if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault(); // 阻止滾動
                window.toggleFlashcard();
            }
        });

        // 輔助函式：Toast 提示
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgColor, icon;
            if (type === 'success') {
                bgColor = 'bg-green-600';
                icon = '<i class="fa-solid fa-circle-check"></i>';
            } else if (type === 'error') {
                bgColor = 'bg-red-600';
                icon = '<i class="fa-solid fa-circle-exclamation"></i>';
            } else {
                bgColor = 'bg-gray-800';
                icon = '<i class="fa-solid fa-circle-info"></i>';
            }

            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center space-x-3 toast-enter pointer-events-auto`;
            toast.innerHTML = `
                <span class="text-lg">${icon}</span>
                <span class="font-medium">${message}</span>
            `;

            container.appendChild(toast);

            // 3秒後移除
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(100%)';
                toast.style.transition = 'all 0.3s ease-in';
                setTimeout(() => container.removeChild(toast), 300);
            }, 3000);
        }

        // 輔助函式：防止 XSS 攻擊
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

    </script>
</body>
